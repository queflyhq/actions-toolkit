name: Build, Release & Deploy

on:
  workflow_call:
    inputs:
      # ── Required ──
      image_name:
        required: true
        type: string
      helm_release_name:
        required: true
        type: string
      k8s_namespace:
        required: true
        type: string
      registry_org:
        required: true
        type: string
      vault_addr:
        required: true
        type: string
      helm_chart:
        required: true
        type: string
      helm_chart_version:
        required: true
        type: string

      # ── Build ──
      build_command:
        required: false
        type: string
        default: 'mvn clean package -DskipTests -B'
      skip_build:
        required: false
        type: boolean
        default: false

      # ── Vault ──
      vault_role:
        required: false
        type: string
        default: 'github-actions'
      vault_auth_path:
        required: false
        type: string
        default: 'jwt'
      vault_github_audience:
        required: false
        type: string
        default: ''
      vault_secret_path:
        required: false
        type: string
        default: 'secret/data/dockerhub'

      # ── Versioning ──
      version_bump:
        required: false
        type: string
        default: ''

      # ── Health Check ──
      health_check_path:
        required: false
        type: string
        default: ''
      health_check_port:
        required: false
        type: string
        default: '8080'

      # ── Deploy ──
      skip_deploy:
        required: false
        type: boolean
        default: false

      # ── Runner ──
      runs_on:
        required: false
        type: string
        default: 'k8s-runner'

jobs:
  # ═══════════════════════════════════════
  # Build → Version → Compile → Image → Release
  # ═══════════════════════════════════════
  build:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      bump_type: ${{ steps.version.outputs.bump_type }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Setup environment
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Version ──
      - name: Calculate version
        id: version
        uses: queflyhq/shared-devops/actions/semantic-version@main
        with:
          version_bump: ${{ inputs.version_bump }}

      # ── Build ──
      - name: Cache Maven dependencies
        if: ${{ !inputs.skip_build }}
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build application
        if: ${{ !inputs.skip_build }}
        run: ${{ inputs.build_command }}

      # ── Vault ──
      - name: Get credentials from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vault_addr }}
          method: jwt
          path: ${{ inputs.vault_auth_path }}
          role: ${{ inputs.vault_role }}
          jwtGithubAudience: ${{ inputs.vault_github_audience }}
          secrets: |
            ${{ inputs.vault_secret_path }} DOCKERHUB_USERNAME | VAULT_DOCKER_USER ;
            ${{ inputs.vault_secret_path }} DOCKERHUB_TOKEN | VAULT_DOCKER_TOKEN

      # ── Docker Build & Push ──
      - name: Build & push image
        id: image
        shell: bash
        run: |
          IMAGE="${{ inputs.registry_org }}/${{ inputs.image_name }}:${{ steps.version.outputs.version }}"
          echo "Building $IMAGE ..."

          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon ready"
              break
            fi
            echo "Waiting for Docker daemon... ($i/30)"
            sleep 2
          done

          echo "${{ steps.vault.outputs.VAULT_DOCKER_TOKEN }}" | docker login -u "${{ steps.vault.outputs.VAULT_DOCKER_USER }}" --password-stdin

          docker build -t $IMAGE -f ./Dockerfile .
          docker push $IMAGE

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # ── Release ──
      - name: Create release
        uses: queflyhq/shared-devops/actions/github-release@main
        with:
          version: ${{ steps.version.outputs.version }}
          tag: ${{ steps.version.outputs.tag }}
          bump_type: ${{ steps.version.outputs.bump_type }}
          previous_tag: ${{ steps.version.outputs.previous_tag }}
          image_name: ${{ inputs.image_name }}
          registry_org: ${{ inputs.registry_org }}
          k8s_namespace: ${{ inputs.k8s_namespace }}
          helm_release_name: ${{ inputs.helm_release_name }}

      # ── Summary ──
      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ inputs.image_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump Type | ${{ steps.version.outputs.bump_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.image.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════
  # Deploy → Helm upgrade → Verify → Health check
  # ═══════════════════════════════════════
  deploy:
    needs: build
    if: ${{ !inputs.skip_deploy }}
    runs-on: ${{ inputs.runs_on }}
    permissions:
      id-token: write

    steps:
      - name: Setup environment
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          kubectl cluster-info

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Vault ──
      - name: Get credentials from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vault_addr }}
          method: jwt
          path: ${{ inputs.vault_auth_path }}
          role: ${{ inputs.vault_role }}
          jwtGithubAudience: ${{ inputs.vault_github_audience }}
          secrets: |
            ${{ inputs.vault_secret_path }} DOCKERHUB_USERNAME | VAULT_DOCKER_USER ;
            ${{ inputs.vault_secret_path }} DOCKERHUB_TOKEN | VAULT_DOCKER_TOKEN

      # ── Deploy ──
      - name: Deploy to Kubernetes
        uses: queflyhq/shared-devops/actions/helm-deploy@main
        with:
          helm_release_name: ${{ inputs.helm_release_name }}
          k8s_namespace: ${{ inputs.k8s_namespace }}
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ needs.build.outputs.version }}
          registry_username: ${{ steps.vault.outputs.VAULT_DOCKER_USER }}
          registry_token: ${{ steps.vault.outputs.VAULT_DOCKER_TOKEN }}
          registry_org: ${{ inputs.registry_org }}
          helm_chart: ${{ inputs.helm_chart }}
          helm_chart_version: ${{ inputs.helm_chart_version }}
          health_check_path: ${{ inputs.health_check_path }}
          health_check_port: ${{ inputs.health_check_port }}

      # ── Summary ──
      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.build.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ inputs.k8s_namespace }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Helm Release | \`${{ inputs.helm_release_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
