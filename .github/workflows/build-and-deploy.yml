name: Build, Release & Deploy

on:
  workflow_call:
    inputs:
      # ── Required ──
      image_name:
        required: true
        type: string
      helm_release_name:
        required: true
        type: string
      k8s_namespace:
        required: true
        type: string

      # ── Build ──
      build_command:
        required: false
        type: string
        default: 'mvn clean package -DskipTests -B'
      skip_build:
        required: false
        type: boolean
        default: false

      # ── Container Build ──
      build_method:
        required: false
        type: string
        default: 'docker'       # 'docker' (DinD) or 'kaniko' (daemonless)

      # ── Registry ──
      registry_org:
        required: false
        type: string
        default: 'queflyhq'

      # ── Vault ──
      vault_addr:
        required: false
        type: string
        default: 'https://vault.ayush.live'
      vault_role:
        required: false
        type: string
        default: 'github-actions'
      vault_auth_path:
        required: false
        type: string
        default: 'jwt'
      vault_github_audience:
        required: false
        type: string
        default: 'https://github.com/AyushHealthcare'
      vault_secret_path:
        required: false
        type: string
        default: 'secret/data/dockerhub'

      # ── Helm ──
      helm_chart:
        required: false
        type: string
        default: 'oci://registry-1.docker.io/queflyhq/ayush-service'
      helm_chart_version:
        required: false
        type: string
        default: '1.2.0'

      # ── Versioning ──
      version_bump:
        required: false
        type: string
        default: ''

      # ── Health Check ──
      health_check_path:
        required: false
        type: string
        default: ''
      health_check_port:
        required: false
        type: string
        default: '8080'

      # ── Runner ──
      runs_on:
        required: false
        type: string
        default: 'k8s-runner'

jobs:
  build-and-deploy:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: write
      id-token: write

    steps:
      # ── Setup ──
      - name: Setup environment
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          kubectl cluster-info

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Version ──
      - name: Calculate version
        id: version
        uses: queflyhq/shared-devops/actions/semantic-version@main
        with:
          version_bump: ${{ inputs.version_bump }}

      # ── Build ──
      - name: Cache Maven dependencies
        if: ${{ !inputs.skip_build }}
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build application
        if: ${{ !inputs.skip_build }}
        run: ${{ inputs.build_command }}

      # ── Vault ──
      - name: Get credentials from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ inputs.vault_addr }}
          method: jwt
          path: ${{ inputs.vault_auth_path }}
          role: ${{ inputs.vault_role }}
          jwtGithubAudience: ${{ inputs.vault_github_audience }}
          secrets: |
            ${{ inputs.vault_secret_path }} DOCKERHUB_USERNAME | VAULT_DOCKER_USER ;
            ${{ inputs.vault_secret_path }} DOCKERHUB_TOKEN | VAULT_DOCKER_TOKEN

      # ── Container Build & Push ──
      - name: Build & push image (Docker)
        if: inputs.build_method == 'docker' || inputs.build_method == ''
        uses: queflyhq/shared-devops/actions/docker-build@main
        with:
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ steps.version.outputs.version }}
          registry_username: ${{ steps.vault.outputs.VAULT_DOCKER_USER }}
          registry_token: ${{ steps.vault.outputs.VAULT_DOCKER_TOKEN }}
          registry_org: ${{ inputs.registry_org }}

      - name: Build & push image (Kaniko)
        if: inputs.build_method == 'kaniko'
        uses: queflyhq/shared-devops/actions/kaniko-build@main
        with:
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ steps.version.outputs.version }}
          registry_username: ${{ steps.vault.outputs.VAULT_DOCKER_USER }}
          registry_token: ${{ steps.vault.outputs.VAULT_DOCKER_TOKEN }}
          registry_org: ${{ inputs.registry_org }}

      # ── Release ──
      - name: Create release
        uses: queflyhq/shared-devops/actions/github-release@main
        with:
          version: ${{ steps.version.outputs.version }}
          tag: ${{ steps.version.outputs.tag }}
          bump_type: ${{ steps.version.outputs.bump_type }}
          previous_tag: ${{ steps.version.outputs.previous_tag }}
          image_name: ${{ inputs.image_name }}
          registry_org: ${{ inputs.registry_org }}
          k8s_namespace: ${{ inputs.k8s_namespace }}
          helm_release_name: ${{ inputs.helm_release_name }}

      # ── Deploy ──
      - name: Deploy to Kubernetes
        uses: queflyhq/shared-devops/actions/helm-deploy@main
        with:
          helm_release_name: ${{ inputs.helm_release_name }}
          k8s_namespace: ${{ inputs.k8s_namespace }}
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ steps.version.outputs.version }}
          registry_username: ${{ steps.vault.outputs.VAULT_DOCKER_USER }}
          registry_token: ${{ steps.vault.outputs.VAULT_DOCKER_TOKEN }}
          registry_org: ${{ inputs.registry_org }}
          helm_chart: ${{ inputs.helm_chart }}
          helm_chart_version: ${{ inputs.helm_chart_version }}
          health_check_path: ${{ inputs.health_check_path }}
          health_check_port: ${{ inputs.health_check_port }}

      # ── Summary ──
      - name: Build summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ inputs.image_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump Type | ${{ steps.version.outputs.bump_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ inputs.k8s_namespace }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ inputs.registry_org }}/${{ inputs.image_name }}:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
