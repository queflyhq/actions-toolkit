name: Build, Release & Deploy

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      helm_release_name:
        required: true
        type: string
      k8s_namespace:
        required: true
        type: string
      build_command:
        required: false
        type: string
        default: 'mvn clean package -DskipTests -B'
      skip_build:
        required: false
        type: boolean
        default: false
      helm_chart_version:
        required: false
        type: string
        default: '1.2.0'
      version_bump:
        required: false
        type: string
        default: ''
      health_check_path:
        required: false
        type: string
        default: ''
      health_check_port:
        required: false
        type: string
        default: '8080'

env:
  DOCKERHUB_ORG: queflyhq
  VAULT_ADDR: https://vault.ayush.live
  VAULT_AUTH_PATH: jwt
  VAULT_ROLE: github-actions

jobs:
  build-and-deploy:
    runs-on: k8s-runner
    permissions:
      contents: write
      id-token: write

    steps:
      # ── Setup ──
      - name: Setup environment
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          kubectl cluster-info

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Version ──
      - name: Calculate version
        id: version
        uses: queflyhq/shared-devops/actions/semantic-version@main
        with:
          version_bump: ${{ inputs.version_bump }}

      # ── Build ──
      - name: Cache Maven dependencies
        if: ${{ !inputs.skip_build }}
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build application
        if: ${{ !inputs.skip_build }}
        run: ${{ inputs.build_command }}

      # ── Vault ──
      - name: Get credentials from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          path: ${{ env.VAULT_AUTH_PATH }}
          role: ${{ env.VAULT_ROLE }}
          jwtGithubAudience: https://github.com/AyushHealthcare
          secrets: |
            secret/data/dockerhub DOCKERHUB_USERNAME | VAULT_DOCKER_USER ;
            secret/data/dockerhub DOCKERHUB_TOKEN | VAULT_DOCKER_TOKEN

      # ── Docker Build & Push ──
      - name: Build & push image
        uses: queflyhq/shared-devops/actions/kaniko-build@main
        with:
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ steps.version.outputs.version }}
          registry_username: ${{ steps.vault.outputs.VAULT_DOCKER_USER }}
          registry_token: ${{ steps.vault.outputs.VAULT_DOCKER_TOKEN }}
          registry_org: ${{ env.DOCKERHUB_ORG }}
          context: ${{ github.workspace }}
          dockerfile: ${{ github.workspace }}/Dockerfile

      # ── Release ──
      - name: Create release
        uses: queflyhq/shared-devops/actions/github-release@main
        with:
          version: ${{ steps.version.outputs.version }}
          tag: ${{ steps.version.outputs.tag }}
          bump_type: ${{ steps.version.outputs.bump_type }}
          previous_tag: ${{ steps.version.outputs.previous_tag }}
          image_name: ${{ inputs.image_name }}
          registry_org: ${{ env.DOCKERHUB_ORG }}
          k8s_namespace: ${{ inputs.k8s_namespace }}
          helm_release_name: ${{ inputs.helm_release_name }}

      # ── Deploy ──
      - name: Deploy to Kubernetes
        uses: queflyhq/shared-devops/actions/helm-deploy@main
        with:
          helm_release_name: ${{ inputs.helm_release_name }}
          k8s_namespace: ${{ inputs.k8s_namespace }}
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ steps.version.outputs.version }}
          registry_username: ${{ steps.vault.outputs.VAULT_DOCKER_USER }}
          registry_token: ${{ steps.vault.outputs.VAULT_DOCKER_TOKEN }}
          registry_org: ${{ env.DOCKERHUB_ORG }}
          helm_chart_version: ${{ inputs.helm_chart_version }}
          health_check_path: ${{ inputs.health_check_path }}
          health_check_port: ${{ inputs.health_check_port }}

      # ── Summary ──
      - name: Build summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ inputs.image_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump Type | ${{ steps.version.outputs.bump_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ inputs.k8s_namespace }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.DOCKERHUB_ORG }}/${{ inputs.image_name }}:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
