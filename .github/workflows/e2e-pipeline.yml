name: E2E Pipeline

on:
  workflow_call:
    inputs:
      suite:
        description: 'smoke, sanity, regression, security, nightly, all'
        required: false
        type: string
        default: 'smoke'
      environment:
        description: 'staging or production'
        required: false
        type: string
        default: 'staging'
      tenant_slug:
        description: 'Tenant slug'
        required: false
        type: string
        default: 'e2e-test'
    outputs:
      total:
        description: 'Total tests'
        value: ${{ jobs.e2e.outputs.total }}
      passed:
        description: 'Passed tests'
        value: ${{ jobs.e2e.outputs.passed }}
      failed:
        description: 'Failed tests'
        value: ${{ jobs.e2e.outputs.failed }}
      skipped:
        description: 'Skipped tests'
        value: ${{ jobs.e2e.outputs.skipped }}

jobs:
  e2e:
    runs-on: qf-k8s-runner
    timeout-minutes: 30
    outputs:
      total: ${{ steps.e2e.outputs.total }}
      passed: ${{ steps.e2e.outputs.passed }}
      failed: ${{ steps.e2e.outputs.failed }}
      skipped: ${{ steps.e2e.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4

      - uses: queflyhq/actions-toolkit/actions/test/e2e-test@main
        id: e2e
        with:
          suite: ${{ inputs.suite }}
          environment: ${{ inputs.environment }}
          tenant_slug: ${{ inputs.tenant_slug }}
