# Reusable pipeline: SDK multi-publish on tag
# test → publish to all configured registries → GitHub Release
#
# Usage:
#   jobs:
#     publish:
#       uses: queflyhq/actions-toolkit/.github/workflows/sdk-publish.yml@main
#       with:
#         language: node          # or python, java, go, dotnet, ruby, php
#         publish_npm: true
#         publish_github: true
#       secrets: inherit

name: SDK Publish Pipeline

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: '.'
      publish_npm:
        required: false
        type: boolean
        default: false
      publish_pypi:
        required: false
        type: boolean
        default: false
      publish_maven:
        required: false
        type: boolean
        default: false
      publish_nuget:
        required: false
        type: boolean
        default: false
      publish_rubygems:
        required: false
        type: boolean
        default: false
      publish_github:
        required: false
        type: boolean
        default: true

jobs:
  test:
    runs-on: k8s-runner
    steps:
      - uses: actions/checkout@v4

      - uses: queflyhq/actions-toolkit/actions/test/go-test@main
        if: inputs.language == 'go'

      - uses: queflyhq/actions-toolkit/actions/test/node-test@main
        if: inputs.language == 'node'
        with:
          working_directory: ${{ inputs.working_directory }}

      - uses: queflyhq/actions-toolkit/actions/test/java-test@main
        if: inputs.language == 'java'
        with:
          working_directory: ${{ inputs.working_directory }}

      - uses: queflyhq/actions-toolkit/actions/test/python-test@main
        if: inputs.language == 'python'
        with:
          working_directory: ${{ inputs.working_directory }}

  publish:
    needs: test
    runs-on: k8s-runner
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: queflyhq/actions-toolkit/actions/publish/npm-publish@main
        if: inputs.publish_npm
        with:
          token: ${{ secrets.NPM_TOKEN }}
          working_directory: ${{ inputs.working_directory }}

      - uses: queflyhq/actions-toolkit/actions/publish/pypi-publish@main
        if: inputs.publish_pypi
        with:
          token: ${{ secrets.PYPI_TOKEN }}
          working_directory: ${{ inputs.working_directory }}

      - uses: queflyhq/actions-toolkit/actions/publish/maven-publish@main
        if: inputs.publish_maven
        with:
          server_username: ${{ secrets.MAVEN_USERNAME }}
          server_password: ${{ secrets.MAVEN_PASSWORD }}
          working_directory: ${{ inputs.working_directory }}

      - uses: queflyhq/actions-toolkit/actions/publish/nuget-publish@main
        if: inputs.publish_nuget
        with:
          api_key: ${{ secrets.NUGET_API_KEY }}
          working_directory: ${{ inputs.working_directory }}

      - uses: queflyhq/actions-toolkit/actions/publish/rubygems-publish@main
        if: inputs.publish_rubygems
        with:
          api_key: ${{ secrets.RUBYGEMS_API_KEY }}
          working_directory: ${{ inputs.working_directory }}

      - uses: queflyhq/actions-toolkit/actions/github-release@main
        if: inputs.publish_github
        with:
          tag: ${{ github.ref_name }}
