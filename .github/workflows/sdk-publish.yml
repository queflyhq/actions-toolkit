# Reusable workflow: SDK publish on tag
# Usage in any SDK repo:
#
# jobs:
#   publish:
#     uses: queflyhq/actions-toolkit/.github/workflows/sdk-publish.yml@main
#     with:
#       language: node
#     secrets: inherit

name: SDK Publish

on:
  workflow_call:
    inputs:
      language:
        description: 'SDK language: node, python, java, go, dotnet, ruby, php'
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: false
      PYPI_TOKEN:
        required: false
      MAVEN_USERNAME:
        required: false
      MAVEN_PASSWORD:
        required: false
      NUGET_API_KEY:
        required: false
      RUBYGEMS_API_KEY:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      # Node.js → npm
      - name: Publish to npm
        if: inputs.language == 'node'
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          npm publish --access public

      # Python → PyPI
      - name: Publish to PyPI
        if: inputs.language == 'python'
        run: |
          pip install build twine
          python -m build
          twine upload dist/* -u __token__ -p ${{ secrets.PYPI_TOKEN }}

      # Go → just tag (go modules auto-resolve from GitHub)
      - name: Tag Go module
        if: inputs.language == 'go'
        run: echo "Go module tagged at ${GITHUB_REF_NAME} — available via go get"

      # Java → Maven Central
      - name: Publish to Maven
        if: inputs.language == 'java'
        run: mvn deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

      # .NET → NuGet
      - name: Publish to NuGet
        if: inputs.language == 'dotnet'
        run: |
          dotnet pack -c Release
          dotnet nuget push **/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      # Ruby → RubyGems
      - name: Publish to RubyGems
        if: inputs.language == 'ruby'
        run: |
          mkdir -p ~/.gem
          echo ":rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          gem build *.gemspec
          gem push *.gem

      # PHP → Packagist (auto-updates from GitHub webhook)
      - name: Publish to Packagist
        if: inputs.language == 'php'
        run: echo "Packagist auto-updates from GitHub tags"
