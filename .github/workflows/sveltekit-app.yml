# Reusable pipeline: SvelteKit App CI/CD
# install → build → deploy to Cloudflare Pages
#
# Usage:
#   jobs:
#     ci:
#       uses: queflyhq/actions-toolkit/.github/workflows/sveltekit-app.yml@main
#       with:
#         project: my-website
#       secrets: inherit

name: SvelteKit Pipeline

on:
  workflow_call:
    inputs:
      project:
        description: 'Cloudflare Pages project name'
        required: true
        type: string
      build_command:
        required: false
        type: string
        default: 'npm run build'
      output_dir:
        required: false
        type: string
        default: 'build'
      deploy:
        required: false
        type: boolean
        default: true

jobs:
  build-deploy:
    runs-on: qf-k8s-runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        shell: bash
        run: |
          command -v node >/dev/null 2>&1 || catalyst install node
          echo "Node $(node --version)"

      - name: Configure GitHub Packages
        run: |
          # Auth + scope only. Modest fetch-retry/timeout bump in case
          # the runner sees a transient mid-stream TLS hiccup against
          # the npm registry. NO maxsockets — that surfaced as auth
          # failures against npm.pkg.github.com.
          {
            echo "@queflyhq:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GIT_BOT_TOKEN }}"
            echo "fetch-retries=3"
            echo "fetch-timeout=300000"
          } > .npmrc

      - name: Install
        shell: bash
        # Two distinct failure modes on the homelab K8s runner that
        # this step has to survive:
        #
        #   1. Transient TLS hiccup against registry.npmjs.org —
        #      ERR_SSL_CIPHER_OPERATION_FAILED mid-stream on a large
        #      tarball. Almost always retryable.
        #
        #   2. ETXTBSY from esbuild's postinstall — a known overlayfs
        #      race: postinstall scripts try to `execFileSync` the
        #      esbuild binary the instant the tarball finishes
        #      extracting, while the kernel still holds the inode
        #      open for writing. Manifests as
        #         spawnSync .../esbuild/bin/esbuild ETXTBSY
        #      Splitting "extract" from "run scripts" by passing
        #      --ignore-scripts on the install, then doing
        #      `npm rebuild` after a brief settle, avoids the race —
        #      by rebuild time every file is closed.
        #
        # Strategy:
        #   - Up to 3 install attempts with --ignore-scripts. If any
        #     succeeds we move on to rebuild. Wipe node_modules
        #     between attempts; drop the lockfile on the final retry
        #     in case of stale resolved-tree state.
        #   - Then `npm rebuild` to run all postinstalls. One retry
        #     in case anything still raced.
        #
        # Errors print directly — no ::group:: nesting that hides
        # them. App-side prebuild scripts handle the workerd-
        # <os>-<arch> optional-deps gap; this step only owns
        # `npm install completes`.
        run: |
          set +e
          MAX_INSTALL=3
          installed=0
          for i in $(seq 1 $MAX_INSTALL); do
            echo "--- npm install (no scripts) attempt $i/$MAX_INSTALL ---"
            npm install --no-audit --no-fund --include=optional --ignore-scripts
            rc=$?
            if [ "$rc" -eq 0 ]; then
              installed=1
              echo "install succeeded on attempt $i"
              break
            fi
            echo "install attempt $i exited $rc"
            if [ "$i" -lt "$MAX_INSTALL" ]; then
              rm -rf node_modules
              if [ "$i" -eq $((MAX_INSTALL - 1)) ]; then
                echo "final install retry: also clearing package-lock.json"
                rm -f package-lock.json
              fi
              sleep $((i * 10))
            fi
          done
          if [ "$installed" -ne 1 ]; then
            echo "all $MAX_INSTALL install attempts failed"
            exit 1
          fi

          # Settle filesystem before running postinstalls — gives the
          # kernel a moment to close any inodes esbuild + friends
          # might still be holding from the extract phase.
          sync || true
          sleep 2

          # Pre-plant @cloudflare/workerd-<os>-<arch> if workerd is in
          # the dep tree. Without this, workerd's postinstall fires a
          # fresh `npm install` subprocess to fetch the platform
          # binary, and that subprocess hits the runner's flaky Node-
          # TLS stack (ERR_SSL_CIPHER_OPERATION_FAILED) — the parent
          # npm install retried fine, but workerd's child npm doesn't
          # share its retry budget.
          #
          # curl uses libcurl/OpenSSL via a different code path than
          # Node's TLS, has --retry built in, and is the standard
          # "registry is up but Node is misbehaving" workaround.
          if [ -f node_modules/workerd/package.json ]; then
            os="$(node -p 'process.platform')"
            arch="$(node -p 'process.arch === \"x64\" ? \"64\" : process.arch')"
            pkg="@cloudflare/workerd-${os}-${arch}"
            ver="$(node -p "require('./node_modules/workerd/package.json').optionalDependencies['$pkg'] || ''")"
            if [ -n "$ver" ] && [ ! -d "node_modules/$pkg" ]; then
              echo "--- pre-planting $pkg@$ver via curl ---"
              tmp="$(mktemp -d)"
              tarball="$tmp/workerd.tgz"
              tarball_url="https://registry.npmjs.org/${pkg}/-/${pkg##*/}-${ver}.tgz"
              curl --silent --show-error --fail \
                   --retry 6 --retry-delay 5 --retry-all-errors \
                   --max-time 120 \
                   -o "$tarball" "$tarball_url" || {
                echo "curl download failed for $tarball_url"
                exit 1
              }
              mkdir -p "node_modules/$pkg"
              tar -xzf "$tarball" -C "node_modules/$pkg" --strip-components=1
              chmod +x "node_modules/$pkg/bin/workerd" 2>/dev/null || true
              rm -rf "$tmp"
              echo "$pkg planted"
            fi
          fi

          echo "--- npm rebuild (run postinstalls) ---"
          npm rebuild
          rc=$?
          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          echo "rebuild attempt 1 exited $rc — sleeping 5s and retrying once"
          sleep 5
          npm rebuild
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "rebuild failed twice"
            exit 1
          fi

      - name: Build
        run: ${{ inputs.build_command }}

      - name: Deploy
        if: inputs.deploy && github.ref == 'refs/heads/main'
        uses: queflyhq/actions-toolkit/actions/deploy/cloudflare-deploy@main
        with:
          type: pages
          project: ${{ inputs.project }}
          directory: ${{ inputs.output_dir }}
          account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
