# Reusable pipeline: SvelteKit App CI/CD
# install → build → deploy to Cloudflare Pages
#
# Usage:
#   jobs:
#     ci:
#       uses: queflyhq/actions-toolkit/.github/workflows/sveltekit-app.yml@main
#       with:
#         project: my-website
#       secrets: inherit

name: SvelteKit Pipeline

on:
  workflow_call:
    inputs:
      project:
        description: 'Cloudflare Pages project name'
        required: true
        type: string
      build_command:
        required: false
        type: string
        default: 'npm run build'
      output_dir:
        required: false
        type: string
        default: 'build'
      deploy:
        required: false
        type: boolean
        default: true

jobs:
  build-deploy:
    runs-on: qf-k8s-runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        shell: bash
        run: |
          command -v node >/dev/null 2>&1 || catalyst install node
          echo "Node $(node --version)"

      - name: Configure GitHub Packages
        run: |
          echo "@queflyhq:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GIT_BOT_TOKEN }}" >> .npmrc

      - name: Install
        shell: bash
        # --include=optional is load-bearing: Cloudflare's adapter pulls
        # @cloudflare/workerd-<platform>-<arch> as an optional dep, and
        # npm silently skips it on some runner setups → build blows up
        # with "package … could not be found, and is needed by workerd".
        # Forcing optional inclusion fixes it.
        #
        # npm install (not ci) because downstream UI repos push
        # package.json bumps without regenerating package-lock.json —
        # ci would EUSAGE on that drift.
        #
        # Retry handles three distinct failure modes seen on qf-k8s-runner:
        #   1. esbuild postinstall ETXTBSY race on overlayfs
        #   2. ERR_SSL_CIPHER_OPERATION_FAILED on first attempt
        #      (stale TLS GCM cache from previous job on the same pod)
        #   3. ERR_SSL_CIPHER_OPERATION_FAILED on every attempt
        #      (IPv6 path to GitHub Packages flapping; AAAA records
        #      resolve but TCP+TLS frames get corrupted mid-stream).
        #      Forcing IPv4 (NODE_OPTIONS=--dns-result-order=ipv4first)
        #      sidesteps the bad path entirely. Combined with
        #      fetch-retries inside npm so individual package fetches
        #      can recover without restarting the whole install.
        env:
          # IPv4-first works around flaky AAAA paths to npm registries
          # from the homelab K8s runner. The eBPF agent on the host
          # occasionally clamps egress MTU on v6 in ways that break
          # AES-GCM tag verification mid-frame.
          NODE_OPTIONS: '--dns-result-order=ipv4first'
          # Per-package fetch retries inside npm itself.
          npm_config_fetch_retries: '5'
          npm_config_fetch_retry_factor: '2'
          npm_config_fetch_retry_mintimeout: '10000'
          npm_config_fetch_retry_maxtimeout: '60000'
        run: |
          attempt() {
            npm install --no-audit --no-fund --no-progress --include=optional --prefer-online
          }
          if ! attempt; then
            echo "first install failed — wiping node_modules + npm cache and retrying"
            rm -rf node_modules
            npm cache clean --force || true
            sleep 5
            if ! attempt; then
              echo "second install failed — final retry with verbose log"
              rm -rf node_modules
              npm cache clean --force || true
              sleep 10
              npm install --no-audit --no-fund --no-progress --include=optional --prefer-online --verbose
            fi
          fi

      - name: Build
        run: ${{ inputs.build_command }}

      - name: Deploy
        if: inputs.deploy && github.ref == 'refs/heads/main'
        uses: queflyhq/actions-toolkit/actions/deploy/cloudflare-deploy@main
        with:
          type: pages
          project: ${{ inputs.project }}
          directory: ${{ inputs.output_dir }}
          account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
