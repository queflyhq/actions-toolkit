# Reusable pipeline: SvelteKit App CI/CD
# install → build → deploy to Cloudflare Pages
#
# Usage:
#   jobs:
#     ci:
#       uses: queflyhq/actions-toolkit/.github/workflows/sveltekit-app.yml@main
#       with:
#         project: my-website
#       secrets: inherit

name: SvelteKit Pipeline

on:
  workflow_call:
    inputs:
      project:
        description: 'Cloudflare Pages project name'
        required: true
        type: string
      build_command:
        required: false
        type: string
        default: 'npm run build'
      output_dir:
        required: false
        type: string
        default: 'build'
      deploy:
        required: false
        type: boolean
        default: true

jobs:
  build-deploy:
    runs-on: qf-k8s-runner
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        shell: bash
        run: |
          command -v node >/dev/null 2>&1 || catalyst install node
          echo "Node $(node --version)"

      - name: Configure GitHub Packages
        run: |
          # Auth + scope only. Modest fetch-retry/timeout bump in case
          # the runner sees a transient mid-stream TLS hiccup against
          # the npm registry. NO maxsockets — that surfaced as auth
          # failures against npm.pkg.github.com.
          {
            echo "@queflyhq:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GIT_BOT_TOKEN }}"
            echo "fetch-retries=3"
            echo "fetch-timeout=300000"
          } > .npmrc

      - name: Install
        shell: bash
        # Two retries, errors visible (no ::group:: nesting). If install
        # fails repeatedly the actual npm error must be readable in the
        # job log so we can act on it. Wipe node_modules between
        # attempts; on the final retry also drop the lockfile in case
        # of stale resolved-tree state.
        #
        # Cross-platform optional deps (workerd-<os>-<arch>) that npm
        # sometimes drops are handled by app-side prebuild scripts —
        # this step only guarantees `npm install` itself completes.
        run: |
          set +e
          MAX_ATTEMPTS=3
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "--- npm install attempt $i/$MAX_ATTEMPTS ---"
            npm install --no-audit --no-fund --include=optional
            rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "install succeeded on attempt $i"
              exit 0
            fi
            echo "attempt $i exited $rc"
            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              rm -rf node_modules
              if [ "$i" -eq $((MAX_ATTEMPTS - 1)) ]; then
                echo "final retry: also clearing package-lock.json"
                rm -f package-lock.json
              fi
              sleep $((i * 10))
            fi
          done
          echo "all $MAX_ATTEMPTS attempts failed"
          exit 1

      - name: Build
        run: ${{ inputs.build_command }}

      - name: Deploy
        if: inputs.deploy && github.ref == 'refs/heads/main'
        uses: queflyhq/actions-toolkit/actions/deploy/cloudflare-deploy@main
        with:
          type: pages
          project: ${{ inputs.project }}
          directory: ${{ inputs.output_dir }}
          account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
