# Reusable pipeline: SvelteKit App CI/CD
# install → build → deploy to Cloudflare Pages
#
# Usage:
#   jobs:
#     ci:
#       uses: queflyhq/actions-toolkit/.github/workflows/sveltekit-app.yml@main
#       with:
#         project: my-website
#       secrets: inherit

name: SvelteKit Pipeline

on:
  workflow_call:
    inputs:
      project:
        description: 'Cloudflare Pages project name'
        required: true
        type: string
      build_command:
        required: false
        type: string
        default: 'npm run build'
      output_dir:
        required: false
        type: string
        default: 'build'
      deploy:
        required: false
        type: boolean
        default: true

jobs:
  build-deploy:
    # ubuntu-latest (GitHub-hosted) for now. The qf-k8s-runner homelab
    # runner has been failing every install with
    # ERR_SSL_CIPHER_OPERATION_FAILED — AES-GCM tag check on TLS frames
    # is corrupted mid-stream, almost certainly the eBPF agent on the
    # host clamping packets in a way that breaks AEAD. Revert to
    # `qf-k8s-runner` once the agent is stabilized.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure GitHub Packages
        run: |
          echo "@queflyhq:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GIT_BOT_TOKEN }}" >> .npmrc

      - name: Install
        shell: bash
        # --include=optional is load-bearing: Cloudflare's adapter pulls
        # @cloudflare/workerd-<platform>-<arch> as an optional dep, and
        # npm silently skips it on some runner setups → build blows up
        # with "package … could not be found, and is needed by workerd".
        # Forcing optional inclusion fixes it.
        #
        # npm install (not ci) because downstream UI repos push
        # package.json bumps without regenerating package-lock.json —
        # ci would EUSAGE on that drift. Retry covers the esbuild
        # postinstall ETXTBSY race that occasionally hits on overlayfs.
        run: |
          attempt() { npm install --no-audit --no-fund --include=optional; }
          if ! attempt; then
            echo "first install failed — wiping node_modules and retrying"
            rm -rf node_modules
            sleep 3
            attempt
          fi

      - name: Build
        run: ${{ inputs.build_command }}

      - name: Deploy
        if: inputs.deploy && github.ref == 'refs/heads/main'
        uses: queflyhq/actions-toolkit/actions/deploy/cloudflare-deploy@main
        with:
          type: pages
          project: ${{ inputs.project }}
          directory: ${{ inputs.output_dir }}
          account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
