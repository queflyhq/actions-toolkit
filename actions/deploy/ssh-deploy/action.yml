name: SSH Deploy
description: Deploy to any server via SSH — on-prem, VM, bare metal.

inputs:
  host:
    description: 'SSH host (IP or hostname)'
    required: true
  user:
    description: 'SSH user'
    required: true
  key:
    description: 'SSH private key'
    required: true
  port:
    description: 'SSH port'
    required: false
    default: '22'
  commands:
    description: 'Commands to run on remote server (multiline)'
    required: true
  pre_commands:
    description: 'Commands to run locally before SSH (e.g. scp files)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Preflight
      shell: bash
      run: |
        command -v ssh >/dev/null 2>&1 || { echo "::error::SSH client is not installed."; exit 1; }

    - name: Setup SSH key
      shell: bash
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.key }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -p ${{ inputs.port }} ${{ inputs.host }} >> ~/.ssh/known_hosts 2>/dev/null

    - name: Pre-deploy (local)
      if: inputs.pre_commands != ''
      shell: bash
      run: ${{ inputs.pre_commands }}
      env:
        SSH_HOST: ${{ inputs.host }}
        SSH_USER: ${{ inputs.user }}
        SSH_PORT: ${{ inputs.port }}
        SSH_KEY: ~/.ssh/deploy_key

    - name: Deploy (remote)
      shell: bash
      run: |
        ssh -i ~/.ssh/deploy_key -p ${{ inputs.port }} ${{ inputs.user }}@${{ inputs.host }} << 'DEPLOY'
        ${{ inputs.commands }}
        DEPLOY
        echo "### SSH Deploy" >> $GITHUB_STEP_SUMMARY
        echo "**Host:** ${{ inputs.host }}" >> $GITHUB_STEP_SUMMARY

    - name: Cleanup
      if: always()
      shell: bash
      run: rm -f ~/.ssh/deploy_key
