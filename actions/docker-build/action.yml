name: Docker Build & Push
description: Build and push Docker image using Docker (DinD sidecar)

inputs:
  image_name:
    description: 'Docker image name (e.g. ayush-auth-service)'
    required: true
  image_tag:
    description: 'Docker image tag (e.g. 1.2.3)'
    required: true
  registry_username:
    description: 'Docker registry username'
    required: true
  registry_token:
    description: 'Docker registry token/password'
    required: true
  registry_org:
    description: 'Docker registry org/namespace'
    required: false
    default: 'queflyhq'
  dockerfile:
    description: 'Path to Dockerfile'
    required: false
    default: './Dockerfile'
  context:
    description: 'Build context path'
    required: false
    default: '.'

outputs:
  image:
    description: 'Full image reference (org/name:tag)'
    value: ${{ steps.build.outputs.image }}

runs:
  using: composite
  steps:
    - name: Wait for Docker daemon
      shell: bash
      run: |
        echo "Waiting for Docker daemon..."
        for i in $(seq 1 30); do
          if docker info >/dev/null 2>&1; then
            echo "Docker daemon ready"
            break
          fi
          sleep 2
        done
        docker info

    - name: Login to Docker Hub
      shell: bash
      run: |
        echo "${{ inputs.registry_token }}" | docker login -u "${{ inputs.registry_username }}" --password-stdin

    - name: Build and push image
      id: build
      shell: bash
      run: |
        IMAGE="${{ inputs.registry_org }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"
        echo "Building $IMAGE ..."

        docker build \
          -t $IMAGE \
          -f ${{ inputs.dockerfile }} \
          ${{ inputs.context }}

        docker push $IMAGE

        echo "image=$IMAGE" >> $GITHUB_OUTPUT
