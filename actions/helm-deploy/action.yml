name: Helm Deploy
description: Deploy to Kubernetes using Helm OCI chart with ImagePullSecret management

inputs:
  helm_release_name:
    description: 'Helm release name (e.g. ayush-auth)'
    required: true
  k8s_namespace:
    description: 'Kubernetes namespace'
    required: true
  image_name:
    description: 'Docker image name'
    required: true
  image_tag:
    description: 'Docker image tag'
    required: true
  registry_username:
    description: 'Docker registry username (for imagePullSecret)'
    required: true
  registry_token:
    description: 'Docker registry token (for imagePullSecret + helm login)'
    required: true
  registry_org:
    description: 'Docker registry org/namespace'
    required: false
    default: 'queflyhq'
  helm_chart:
    description: 'OCI Helm chart reference'
    required: false
    default: 'oci://registry-1.docker.io/queflyhq/ayush-service'
  helm_chart_version:
    description: 'Helm chart version'
    required: false
    default: '1.2.0'
  values_file:
    description: 'Path to Helm values file'
    required: false
    default: './helm/values.yaml'
  timeout:
    description: 'Helm deploy timeout'
    required: false
    default: '10m'
  health_check_path:
    description: 'Health check endpoint path (empty = skip)'
    required: false
    default: ''
  health_check_port:
    description: 'Container port for health check'
    required: false
    default: '8080'

runs:
  using: composite
  steps:
    - name: Create namespace & ImagePullSecret
      shell: bash
      run: |
        kubectl create namespace ${{ inputs.k8s_namespace }} 2>/dev/null || true

        kubectl delete secret dockerhub-credentials -n ${{ inputs.k8s_namespace }} 2>/dev/null || true

        kubectl create secret docker-registry dockerhub-credentials \
          --namespace ${{ inputs.k8s_namespace }} \
          --docker-server=https://index.docker.io/v1/ \
          --docker-username=${{ inputs.registry_username }} \
          --docker-password=${{ inputs.registry_token }}

    - name: Helm registry login
      shell: bash
      run: |
        echo "${{ inputs.registry_token }}" | helm registry login registry-1.docker.io \
          -u ${{ inputs.registry_username }} --password-stdin

    - name: Wait for existing operations
      shell: bash
      run: |
        RELEASE="${{ inputs.helm_release_name }}"
        NS="${{ inputs.k8s_namespace }}"
        MAX_WAIT=300
        WAITED=0

        while [ $WAITED -lt $MAX_WAIT ]; do
          STATUS=$(helm status "$RELEASE" -n "$NS" -o json 2>/dev/null | jq -r '.info.status // empty' 2>/dev/null || echo "")

          if [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ] || [ "$STATUS" = "pending-rollback" ]; then
            echo "Release '$RELEASE' is in '$STATUS' state. Waiting... (${WAITED}s/${MAX_WAIT}s)"
            sleep 10
            WAITED=$((WAITED + 10))
          else
            if [ -n "$STATUS" ]; then
              echo "Release '$RELEASE' is in '$STATUS' state — ready to deploy"
            else
              echo "No existing release found — fresh install"
            fi
            break
          fi
        done

        if [ $WAITED -ge $MAX_WAIT ]; then
          echo "Timed out waiting for pending operation. Force rolling back..."
          helm rollback "$RELEASE" -n "$NS" 2>/dev/null || true
          sleep 5
        fi

    - name: Deploy with Helm
      shell: bash
      run: |
        echo "Deploying ${{ inputs.image_name }}:${{ inputs.image_tag }} → ${{ inputs.k8s_namespace }}"

        helm upgrade --install ${{ inputs.helm_release_name }} \
          ${{ inputs.helm_chart }} --version ${{ inputs.helm_chart_version }} \
          --namespace ${{ inputs.k8s_namespace }} \
          -f ${{ inputs.values_file }} \
          --set image.tag=${{ inputs.image_tag }} \
          --set image.repository=${{ inputs.registry_org }}/${{ inputs.image_name }} \
          --wait \
          --timeout ${{ inputs.timeout }} \
          --cleanup-on-fail \
          --atomic

    - name: Verify rollout
      shell: bash
      run: |
        kubectl rollout status deployment/${{ inputs.helm_release_name }} \
          -n ${{ inputs.k8s_namespace }} --timeout=300s

    - name: Health check
      if: ${{ inputs.health_check_path != '' }}
      continue-on-error: true
      shell: bash
      run: |
        sleep 30

        POD_NAME=$(kubectl get pods -n ${{ inputs.k8s_namespace }} \
          -l app.kubernetes.io/name=${{ inputs.helm_release_name }} \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")

        if [ -z "$POD_NAME" ]; then
          echo "No pod found, skipping health check"
          exit 0
        fi

        LOCAL_PORT=$((RANDOM % 1000 + 9000))
        kubectl port-forward -n ${{ inputs.k8s_namespace }} $POD_NAME ${LOCAL_PORT}:${{ inputs.health_check_port }} &
        PF_PID=$!
        sleep 5

        HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${LOCAL_PORT}${{ inputs.health_check_path }} || echo "000")

        kill $PF_PID 2>/dev/null || true
        echo "Health check: $HEALTH_STATUS"
