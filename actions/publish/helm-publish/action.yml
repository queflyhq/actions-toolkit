name: Helm OCI Publish
description: Package and push Helm chart as OCI artifact to any registry.

inputs:
  chart_path:
    description: 'Path to chart directory'
    required: true
  registry:
    description: 'OCI registry (e.g. docker.io/queflyhq, ghcr.io/queflyhq)'
    required: true
  registry_username:
    description: 'Registry username'
    required: true
  registry_token:
    description: 'Registry token'
    required: true

runs:
  using: composite
  steps:
    - name: Preflight
      shell: bash
      run: |
        command -v helm >/dev/null 2>&1 || { echo "::error::Helm is not installed."; exit 1; }

    - name: Login
      shell: bash
      run: |
        REGISTRY_HOST=$(echo "${{ inputs.registry }}" | cut -d'/' -f1)
        echo "${{ inputs.registry_token }}" | helm registry login $REGISTRY_HOST -u "${{ inputs.registry_username }}" --password-stdin

    - name: Package and push
      shell: bash
      run: |
        helm package ${{ inputs.chart_path }}
        CHART_TGZ=$(ls *.tgz | head -1)
        helm push $CHART_TGZ oci://${{ inputs.registry }}
        echo "### Helm Chart Published" >> $GITHUB_STEP_SUMMARY
        echo "**Chart:** \`$CHART_TGZ\`" >> $GITHUB_STEP_SUMMARY
        echo "**Registry:** \`oci://${{ inputs.registry }}\`" >> $GITHUB_STEP_SUMMARY
