name: AWS Secrets Manager
description: Fetch secrets from AWS Secrets Manager and inject as env vars.

inputs:
  secrets:
    description: |
      Secrets to fetch (one per line): secret-name ENV_VAR_NAME
        my-app/db DB_URL
        my-app/db DB_PASSWORD
    required: true
  region:
    description: 'AWS region'
    required: false
    default: 'us-east-1'

runs:
  using: composite
  steps:
    - name: Preflight
      shell: bash
      run: |
        command -v aws >/dev/null 2>&1 || { echo "::error::AWS CLI is not installed."; exit 1; }
        command -v jq >/dev/null 2>&1 || { echo "::error::jq is not installed."; exit 1; }

    - name: Fetch secrets
      shell: bash
      run: |
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          SECRET_NAME=$(echo "$line" | awk '{print $1}')
          ENV_KEY=$(echo "$line" | awk '{print $2}')

          VALUE=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_NAME" \
            --region "${{ inputs.region }}" \
            --query 'SecretString' --output text | jq -r ".[\"$ENV_KEY\"] // .")

          echo "::add-mask::$VALUE"
          echo "${ENV_KEY}=${VALUE}" >> $GITHUB_ENV
        done <<< "${{ inputs.secrets }}"
