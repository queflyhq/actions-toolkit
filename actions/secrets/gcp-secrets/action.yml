name: GCP Secret Manager
description: Fetch secrets from GCP Secret Manager and inject as env vars.

inputs:
  secrets:
    description: |
      Secrets to fetch (one per line): secret-name ENV_VAR_NAME
        db-url DB_URL
        db-password DB_PASSWORD
    required: true
  project:
    description: 'GCP project ID'
    required: true
  version:
    description: 'Secret version'
    required: false
    default: 'latest'

runs:
  using: composite
  steps:
    - name: Preflight
      shell: bash
      run: |
        command -v gcloud >/dev/null 2>&1 || { echo "::error::gcloud CLI is not installed."; exit 1; }

    - name: Fetch secrets
      shell: bash
      run: |
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          SECRET_NAME=$(echo "$line" | awk '{print $1}')
          ENV_KEY=$(echo "$line" | awk '{print $2}')

          VALUE=$(gcloud secrets versions access ${{ inputs.version }} \
            --secret="$SECRET_NAME" \
            --project="${{ inputs.project }}")

          echo "::add-mask::$VALUE"
          echo "${ENV_KEY}=${VALUE}" >> $GITHUB_ENV
        done <<< "${{ inputs.secrets }}"
