name: Vault Secrets
description: Fetch secrets from HashiCorp Vault and inject as env vars or files.

inputs:
  vault_addr:
    description: 'Vault server URL'
    required: true
  auth_method:
    description: 'token, approle, github, jwt, or kubernetes'
    required: false
    default: 'token'
  vault_token:
    description: 'Vault token (for token auth)'
    required: false
  role_id:
    description: 'AppRole role ID'
    required: false
  secret_id:
    description: 'AppRole secret ID'
    required: false
  github_token:
    description: 'GitHub token (for github auth)'
    required: false
  jwt:
    description: 'JWT token (for jwt/OIDC auth)'
    required: false
  role:
    description: 'Vault role name (for jwt/k8s/approle auth)'
    required: false
  secrets:
    description: |
      Secrets to fetch (one per line):
        secret/data/myapp DB_URL
        secret/data/myapp DB_PASSWORD
        secret/data/aws AWS_ACCESS_KEY_ID
    required: true
  export_as:
    description: 'env (environment variables) or file (write to .env file)'
    required: false
    default: 'env'

runs:
  using: composite
  steps:
    - name: Preflight
      shell: bash
      run: |
        command -v vault >/dev/null 2>&1 || { echo "::error::Vault CLI is not installed."; exit 1; }
        command -v jq >/dev/null 2>&1 || { echo "::error::jq is not installed."; exit 1; }

    - name: Authenticate
      shell: bash
      run: |
        export VAULT_ADDR="${{ inputs.vault_addr }}"

        case "${{ inputs.auth_method }}" in
          token)
            export VAULT_TOKEN="${{ inputs.vault_token }}"
            ;;
          approle)
            VAULT_TOKEN=$(vault write -field=token auth/approle/login \
              role_id="${{ inputs.role_id }}" secret_id="${{ inputs.secret_id }}")
            ;;
          github)
            VAULT_TOKEN=$(vault write -field=token auth/github/login token="${{ inputs.github_token }}")
            ;;
          jwt)
            VAULT_TOKEN=$(vault write -field=token auth/jwt/login \
              role="${{ inputs.role }}" jwt="${{ inputs.jwt }}")
            ;;
          kubernetes)
            SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
              role="${{ inputs.role }}" jwt="$SA_TOKEN")
            ;;
        esac

        echo "VAULT_ADDR=${{ inputs.vault_addr }}" >> $GITHUB_ENV
        echo "VAULT_TOKEN=$VAULT_TOKEN" >> $GITHUB_ENV

    - name: Fetch secrets
      shell: bash
      run: |
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          SECRET_PATH=$(echo "$line" | awk '{print $1}')
          SECRET_KEY=$(echo "$line" | awk '{print $2}')

          VALUE=$(vault kv get -field="$SECRET_KEY" "$SECRET_PATH" 2>/dev/null || \
                  vault read -field="$SECRET_KEY" "$SECRET_PATH")

          if [ "${{ inputs.export_as }}" = "file" ]; then
            echo "${SECRET_KEY}=${VALUE}" >> .env
          else
            echo "::add-mask::$VALUE"
            echo "${SECRET_KEY}=${VALUE}" >> $GITHUB_ENV
          fi
        done <<< "${{ inputs.secrets }}"

        echo "### Vault Secrets" >> $GITHUB_STEP_SUMMARY
        echo "Fetched $(echo "${{ inputs.secrets }}" | grep -c .)" >> $GITHUB_STEP_SUMMARY
