name: Trivy Scan
description: Scan container image or filesystem for vulnerabilities.

inputs:
  target:
    description: 'Image name or filesystem path to scan'
    required: true
  type:
    description: 'Scan type: image or fs'
    required: false
    default: 'image'
  severity:
    description: 'Severity filter (CRITICAL,HIGH,MEDIUM,LOW)'
    required: false
    default: 'CRITICAL,HIGH'
  exit_code:
    description: 'Exit code on findings (0 to warn, 1 to fail)'
    required: false
    default: '1'
  format:
    description: 'Output format: table, json, sarif'
    required: false
    default: 'table'

runs:
  using: composite
  steps:
    - name: Install Trivy
      shell: bash
      run: |
        if ! command -v trivy >/dev/null 2>&1; then
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        fi

    - name: Scan
      shell: bash
      run: |
        trivy ${{ inputs.type }} \
          --severity ${{ inputs.severity }} \
          --exit-code ${{ inputs.exit_code }} \
          --format ${{ inputs.format }} \
          ${{ inputs.target }}
