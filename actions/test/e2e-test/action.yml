name: E2E Test (Java + Allure)
description: Run E2E tests with Allure reporting. Supports smoke/sanity/regression/security/all suites.

inputs:
  suite:
    description: 'Test suite: smoke, sanity, regression, security, nightly, all'
    required: false
    default: 'smoke'
  environment:
    description: 'Target environment: staging, production, local'
    required: false
    default: 'staging'
  tenant_slug:
    description: 'Tenant slug for E2E tests'
    required: false
    default: 'e2e-test'
  working_directory:
    description: 'Directory containing pom.xml'
    required: false
    default: '.'
  allure_results:
    description: 'Path to Allure results directory'
    required: false
    default: 'allure-results'

outputs:
  total:
    description: 'Total tests run'
    value: ${{ steps.results.outputs.total }}
  passed:
    description: 'Tests passed'
    value: ${{ steps.results.outputs.passed }}
  failed:
    description: 'Tests failed'
    value: ${{ steps.results.outputs.failed }}
  skipped:
    description: 'Tests skipped'
    value: ${{ steps.results.outputs.skipped }}

runs:
  using: composite
  steps:
    - name: Install Java + Maven
      shell: bash
      run: |
        if ! command -v java >/dev/null 2>&1; then
          command -v catalyst >/dev/null 2>&1 && catalyst install java maven || { echo "::error::Java/Maven not available"; exit 1; }
        fi
        echo "Java $(java --version 2>&1 | head -1)"

    - name: Run E2E tests
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        E2E_ENV: ${{ inputs.environment }}
        E2E_TENANT_SLUG: ${{ inputs.tenant_slug }}
      run: |
        SUITE="${{ inputs.suite }}"
        if [ "$SUITE" = "all" ]; then
          mvn test -B 2>&1 | tee test-output.log || true
        elif [ "$SUITE" = "nightly" ]; then
          mvn test -B -Dgroups="smoke,sanity,regression,security,nightly" 2>&1 | tee test-output.log || true
        else
          mvn test -B -Dgroups="$SUITE" 2>&1 | tee test-output.log || true
        fi

    - name: Parse results
      id: results
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      if: always()
      run: |
        TOTAL=0; FAIL=0; ERR=0; SKIP=0
        if [ -d target/surefire-reports ]; then
          for f in target/surefire-reports/TEST-*.xml; do
            [ -f "$f" ] || continue
            T=$(grep -o 'tests="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
            F=$(grep -o 'failures="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
            E=$(grep -o 'errors="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
            S=$(grep -o 'skipped="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
            TOTAL=$((TOTAL + ${T:-0}))
            FAIL=$((FAIL + ${F:-0}))
            ERR=$((ERR + ${E:-0}))
            SKIP=$((SKIP + ${S:-0}))
          done
        fi
        PASSED=$((TOTAL - FAIL - ERR - SKIP))
        echo "total=$TOTAL" >> $GITHUB_OUTPUT
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$((FAIL + ERR))" >> $GITHUB_OUTPUT
        echo "skipped=$SKIP" >> $GITHUB_OUTPUT

        # Summary
        echo "### E2E Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Environment | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Suite | \`${{ inputs.suite }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Total | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
        echo "| Passed | **$PASSED** |" >> $GITHUB_STEP_SUMMARY
        echo "| Failed | **$((FAIL + ERR))** |" >> $GITHUB_STEP_SUMMARY
        echo "| Skipped | **$SKIP** |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ $((FAIL + ERR)) -gt 0 ]; then
          echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          grep "FAILURE!\|ERROR!" target/surefire-reports/*.txt 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "::error::$((FAIL + ERR)) test(s) failed"
          exit 1
        fi

    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ inputs.suite }}
        path: ${{ inputs.working_directory }}/${{ inputs.allure_results }}
        retention-days: 30
        if-no-files-found: ignore

    - name: Upload Surefire reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports-${{ inputs.suite }}
        path: ${{ inputs.working_directory }}/target/surefire-reports
        retention-days: 30
        if-no-files-found: ignore
