name: Go Test
description: Run Go tests with coverage. Auto-installs Go via catalyst if missing.

inputs:
  working_directory:
    description: 'Directory containing go.mod'
    required: false
    default: '.'
  coverage_threshold:
    description: 'Minimum coverage % (0 to skip)'
    required: false
    default: '0'
  goprivate:
    description: 'GOPRIVATE pattern'
    required: false
    default: ''
  github_token:
    description: 'GitHub token for private deps (PAT with repo scope for cross-repo access)'
    required: false
    default: ''
  race:
    description: 'Enable race detector'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install Go
      shell: bash
      run: |
        if ! command -v go >/dev/null 2>&1; then
          command -v catalyst >/dev/null 2>&1 && catalyst install go || { echo "::error::Go is not installed and catalyst is not available."; exit 1; }
        fi
        echo "Go $(go version | awk '{print $3}')"

    - name: Configure
      shell: bash
      run: |
        if [ -n "${{ inputs.goprivate }}" ]; then
          go env -w GOPRIVATE="${{ inputs.goprivate }}"
          TOKEN="${{ inputs.github_token }}"
          [ -z "$TOKEN" ] && TOKEN="${GITHUB_TOKEN}"
          git config --global url."https://${TOKEN}@github.com/".insteadOf "https://github.com/"
        fi
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Download dependencies
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        go mod tidy
        go mod download

    - name: Test
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        RACE_FLAG=""
        if [ "${{ inputs.race }}" = "true" ]; then
          # Race detector requires cgo — only enable if gcc is available
          command -v gcc >/dev/null 2>&1 && RACE_FLAG="-race" || echo "Skipping -race (cgo not available)"
        fi
        go test -v $RACE_FLAG -coverprofile=coverage.out ./... 2>&1 | tee test-output.txt
        echo "### Go Test Results" >> $GITHUB_STEP_SUMMARY
        tail -3 test-output.txt >> $GITHUB_STEP_SUMMARY

    - name: Coverage check
      if: inputs.coverage_threshold != '0'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        COV=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "**Coverage: ${COV}%**" >> $GITHUB_STEP_SUMMARY
        if (( $(echo "$COV < ${{ inputs.coverage_threshold }}" | bc -l) )); then
          echo "::error::Coverage ${COV}% below threshold ${{ inputs.coverage_threshold }}%"
          exit 1
        fi
