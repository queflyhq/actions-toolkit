name: Java Test
description: Run Java tests via Maven or Gradle. Auto-installs Java/Maven via catalyst if missing.

inputs:
  working_directory:
    description: 'Directory containing pom.xml or build.gradle'
    required: false
    default: '.'
  build_tool:
    description: 'maven or gradle'
    required: false
    default: 'maven'

runs:
  using: composite
  steps:
    - name: Install Java
      shell: bash
      run: |
        if ! command -v java >/dev/null 2>&1; then
          command -v catalyst >/dev/null 2>&1 && catalyst install java || { echo "::error::Java is not installed and catalyst is not available."; exit 1; }
        fi
        if [ "${{ inputs.build_tool }}" = "gradle" ]; then
          [ -f "${{ inputs.working_directory }}/gradlew" ] || { echo "::error::gradlew not found in ${{ inputs.working_directory }}"; exit 1; }
        elif ! command -v mvn >/dev/null 2>&1; then
          command -v catalyst >/dev/null 2>&1 && catalyst install maven || { echo "::error::Maven is not installed and catalyst is not available."; exit 1; }
        fi
        echo "Java $(java --version 2>&1 | head -1)"

    - name: Test
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        if [ "${{ inputs.build_tool }}" = "gradle" ]; then
          ./gradlew test
        else
          mvn test -B
        fi
