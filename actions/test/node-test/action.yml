name: Node.js Test
description: Run Node.js tests. Auto-installs Node.js via catalyst if missing.

inputs:
  working_directory:
    description: 'Directory containing package.json'
    required: false
    default: '.'
  test_command:
    description: 'Test command'
    required: false
    default: 'npm test'
  install_command:
    description: 'Install command'
    required: false
    default: 'npm ci'

runs:
  using: composite
  steps:
    - name: Install Node.js
      shell: bash
      run: |
        if ! command -v node >/dev/null 2>&1; then
          command -v catalyst >/dev/null 2>&1 && catalyst install node || { echo "::error::Node.js is not installed and catalyst is not available."; exit 1; }
        fi
        echo "Node $(node --version), npm $(npm --version)"

    - name: Install
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: ${{ inputs.install_command }}

    - name: Test
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: ${{ inputs.test_command }}
