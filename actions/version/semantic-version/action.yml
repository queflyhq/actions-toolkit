name: Semantic Version
description: |
  Auto-calculate next version from git tags + conventional commits.

  Commit prefix → bump type:
    feat:     → minor   (new feature)
    fix:      → patch   (bug fix)
    perf:     → patch   (performance)
    docs:     → patch   (documentation)
    chore:    → patch   (maintenance)
    refactor: → patch   (refactoring)
    BREAKING CHANGE / feat!: / fix!: → major

  Scans ALL commits since last tag, picks the highest bump.

inputs:
  version_bump:
    description: 'Override: patch, minor, major (empty = auto-detect)'
    required: false
    default: ''
  prefix:
    description: 'Tag prefix (default: v)'
    required: false
    default: 'v'
  pre_release:
    description: 'Pre-release label (e.g. beta, rc, empty for stable)'
    required: false
    default: ''

outputs:
  version:
    description: 'New version (e.g. 1.2.3)'
    value: ${{ steps.calc.outputs.version }}
  tag:
    description: 'New tag (e.g. v1.2.3)'
    value: ${{ steps.calc.outputs.tag }}
  bump_type:
    description: 'Resolved bump type'
    value: ${{ steps.calc.outputs.bump_type }}
  previous_tag:
    description: 'Previous tag'
    value: ${{ steps.calc.outputs.previous_tag }}
  changelog:
    description: 'Changelog since last tag'
    value: ${{ steps.calc.outputs.changelog }}

runs:
  using: composite
  steps:
    - name: Preflight
      shell: bash
      run: |
        command -v git >/dev/null 2>&1 || { echo "::error::git is not installed."; exit 1; }

    - name: Fetch tags
      shell: bash
      run: git fetch --tags --force

    - name: Calculate version
      id: calc
      shell: bash
      run: |
        PREFIX="${{ inputs.prefix }}"
        LATEST_TAG=$(git tag -l "${PREFIX}*" --sort=-v:refname | head -n1)

        if [ -z "$LATEST_TAG" ]; then
          LATEST_TAG="${PREFIX}0.0.0"
          echo "No existing tags, starting from 0.0.0"
        fi

        VERSION=${LATEST_TAG#${PREFIX}}
        MAJOR=$(echo $VERSION | cut -d. -f1)
        MINOR=$(echo $VERSION | cut -d. -f2)
        PATCH=$(echo $VERSION | cut -d. -f3 | cut -d- -f1)

        BUMP="${{ inputs.version_bump }}"

        if [ -z "$BUMP" ]; then
          # Scan all commits since last tag
          COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=%B 2>/dev/null || git log --pretty=%B)

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi
        fi

        case $BUMP in
          major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
          *)     PATCH=$((PATCH + 1)) ;;
        esac

        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
        [ -n "${{ inputs.pre_release }}" ] && NEW_VERSION="${NEW_VERSION}-${{ inputs.pre_release }}"
        NEW_TAG="${PREFIX}${NEW_VERSION}"

        # Generate changelog
        CHANGELOG=$(git log ${LATEST_TAG}..HEAD --pretty="- %s (%h)" 2>/dev/null || echo "- Initial release")

        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
        echo "bump_type=$BUMP" >> $GITHUB_OUTPUT
        echo "previous_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
        echo "changelog<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT

        echo "### Version: \`$NEW_TAG\` ($BUMP)" >> $GITHUB_STEP_SUMMARY
        echo "Previous: \`$LATEST_TAG\`" >> $GITHUB_STEP_SUMMARY
        echo "$CHANGELOG" >> $GITHUB_STEP_SUMMARY
