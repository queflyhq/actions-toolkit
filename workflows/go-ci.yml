# Reusable workflow: Go CI (test + build + optional deploy)
# Usage in any Go service repo:
#
# jobs:
#   ci:
#     uses: queflyhq/actions-toolkit/.github/workflows/go-ci.yml@main
#     with:
#       service_name: authfi-auth-service
#     secrets: inherit

name: Go CI

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Service name'
        required: true
        type: string
      go_version:
        description: 'Go version'
        required: false
        type: string
        default: '1.25'
      deploy:
        description: 'Deploy after build (true/false)'
        required: false
        type: boolean
        default: false
      deploy_target:
        description: 'cloudrun or k8s'
        required: false
        type: string
        default: 'cloudrun'
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_TOKEN:
        required: false
      GCP_CREDENTIALS:
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: queflyhq/actions-toolkit/actions/go-test@main
        with:
          go_version: ${{ inputs.go_version }}

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: queflyhq/actions-toolkit/actions/go-service-deploy@main
        with:
          service_name: ${{ inputs.service_name }}
          image_tag: ${{ github.sha }}
          registry_username: ${{ secrets.DOCKER_USERNAME }}
          registry_token: ${{ secrets.DOCKER_TOKEN }}
          registry_org: queflyhq
          deploy_target: ${{ inputs.deploy && inputs.deploy_target || 'none' }}
          gcp_credentials: ${{ secrets.GCP_CREDENTIALS }}
